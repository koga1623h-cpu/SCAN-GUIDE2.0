<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F8FAFC;font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;font-size:15px;color:#0F172A}
button{border:none;background:none;cursor:pointer;font-family:inherit}
input{font-family:inherit;border:none;outline:none}
.hdr{background:#fff;border-bottom:1px solid #E8EDF3;padding:16px 16px 12px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:22px;font-weight:800;letter-spacing:-0.03em}
.hdr-sub{font-size:12px;color:#94A3B8;margin-top:2px}
.hdr-back{display:flex;align-items:center;gap:10px}
.back-btn{color:#0055CC;display:flex;align-items:center;padding:4px;flex-shrink:0}
.hdr-cat-icon{width:32px;height:32px;border-radius:3px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.hdr-cat-label{font-size:11px;color:#94A3B8;font-weight:600}
.hdr-item-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-wrap{padding:12px 16px 8px;position:relative}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:#94A3B8;pointer-events:none;display:flex}
.search-input{width:100%;background:#fff;border:1px solid #E8EDF3;border-radius:4px;padding:11px 14px 11px 38px;font-size:15px;color:#0F172A}
.tabs{display:flex;gap:6px;padding:4px 16px 10px;overflow-x:auto}
.tab{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:4px;font-size:13px;font-weight:600;border:1.5px solid #E8EDF3;background:#fff;color:#64748B}
.list{padding:4px 16px 32px}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:14px 0 8px}
.sec-icon{width:26px;height:26px;border-radius:3px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.sec-label{font-size:13px;font-weight:700;color:#475569}
.card{display:flex;align-items:stretch;background:#fff;border-radius:0;border:1px solid #E8EDF3;margin-bottom:8px;cursor:pointer;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card:active{opacity:.65}
.card-bar{width:4px;flex-shrink:0}
.card-body{flex:1;padding:14px 12px 14px 14px}
.card-title{font-size:15px;font-weight:600;line-height:1.4}
.card-sub{font-size:12px;color:#94A3B8;margin-top:3px}
.card-right{display:flex;align-items:center;gap:6px;padding-right:14px;flex-shrink:0}
.badge{font-size:10px;font-weight:700;background:#FEE2E2;color:#DC2626;padding:2px 6px;border-radius:4px}
.empty{text-align:center;padding:60px 0;color:#CBD5E1}
.detail-body{padding:18px 16px 40px}
.detail-new{display:inline-block;font-size:10px;font-weight:700;background:#FEE2E2;color:#DC2626;padding:2px 8px;border-radius:4px;margin-bottom:12px}
.detail-title{font-size:19px;font-weight:800;line-height:1.4;padding-bottom:16px;border-bottom:1px solid #E8EDF3;margin-bottom:18px}
.sec-section{margin-bottom:22px}
.sec-section-title{font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.step-row{display:flex;gap:12px;margin-bottom:10px;align-items:flex-start}
.step-num{flex-shrink:0;width:26px;height:26px;border-radius:0;background:#0055CC;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:1px}
.step-text{font-size:15px;line-height:1.7;padding-top:3px}
.info-card{display:flex;gap:10px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:4px;padding:12px 14px;margin-bottom:14px;align-items:flex-start}
.info-text{font-size:14px;line-height:1.75;color:#1E3A5F}
.warn-card{display:flex;gap:10px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:4px;padding:12px 14px;margin-bottom:14px;align-items:flex-start}
.warn-text{font-size:14px;line-height:1.75;color:#78350F}
.memo-section{margin-top:8px}
.memo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.memo-label{font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.08em;text-transform:uppercase}
.memo-add-btn{font-size:12px;font-weight:700;color:#0055CC;padding:4px 8px;border:1.5px solid #0055CC;border-radius:4px}
.memo-item{background:#FFFDF0;border:1px solid #FDE68A;border-left:4px solid #F59E0B;padding:12px 14px;margin-bottom:8px;position:relative}
.memo-item-text{font-size:14px;line-height:1.7;color:#1a1a2e;white-space:pre-wrap;padding-right:48px}
.memo-item-date{font-size:11px;color:#94A3B8;margin-top:6px}
.memo-item-del{position:absolute;top:10px;right:10px;font-size:11px;color:#DC2626;font-weight:700;padding:3px 7px;border:1px solid #DC2626;border-radius:3px}
.memo-form{background:#fff;border:1px solid #E8EDF3;padding:12px}
.memo-textarea{width:100%;min-height:90px;border:1px solid #E8EDF3;padding:10px;font-size:14px;font-family:inherit;color:#0F172A;resize:none;outline:none;border-radius:0;line-height:1.65}
.memo-form-btns{display:flex;gap:8px;margin-top:8px;justify-content:flex-end}
.memo-save-btn{font-size:13px;font-weight:700;color:#fff;background:#0055CC;padding:8px 16px;border-radius:4px}
.memo-cancel-btn{font-size:13px;font-weight:700;color:#64748B;padding:8px 16px;border:1px solid #E8EDF3;border-radius:4px}
.memo-empty{font-size:13px;color:#CBD5E1;padding:8px 0}

let S={cat:'all',q:'',det:null,memoEdit:false};

// メモをlocalStorageで管理
function getMemos(id){try{return JSON.parse(localStorage.getItem('memo_'+id)||'[]');}catch{return[];}}
function saveMemos(id,memos){localStorage.setItem('memo_'+id,JSON.stringify(memos));}

function renderMemos(id){
  const memos=getMemos(id);
  const sec=document.getElementById('memo-sec');if(!sec)return;
  let h='<div class="memo-section"><div class="memo-header"><span class="memo-label">現場メモ</span><button class="memo-add-btn" id="memo-add-btn">＋ メモを追加</button></div>';
  if(memos.length===0)h+='<div class="memo-empty">まだメモがありません</div>';
  memos.forEach((m,i)=>{
    h+='<div class="memo-item"><div class="memo-item-text">'+m.text.replace(/</g,'&lt;')+'</div><div class="memo-item-date">'+m.date+'</div><button class="memo-item-del" data-idx="'+i+'">削除</button></div>';
  });
  if(S.memoEdit){
    h+='<div class="memo-form"><textarea class="memo-textarea" id="memo-ta" placeholder="気づいたこと、追加の手順、注意点など..."></textarea><div class="memo-form-btns"><button class="memo-cancel-btn" id="memo-cancel">キャンセル</button><button class="memo-save-btn" id="memo-save">保存</button></div></div>';
  }
  h+='</div>';
  sec.innerHTML=h;
  document.getElementById('memo-add-btn').onclick=()=>{S.memoEdit=true;renderMemos(id);setTimeout(()=>{const ta=document.getElementById('memo-ta');if(ta)ta.focus();},50);};
  if(S.memoEdit){
    document.getElementById('memo-cancel').onclick=()=>{S.memoEdit=false;renderMemos(id);};
    document.getElementById('memo-save').onclick=()=>{
      const ta=document.getElementById('memo-ta');
      const txt=(ta.value||'').trim();
      if(!txt)return;
      const memos=getMemos(id);
      const now=new Date();
      const date=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+(now.getDate())+' '+(now.getHours()+':').padStart(3,'0')+(String(now.getMinutes()).padStart(2,'0'));
      memos.unshift({text:txt,date});
      saveMemos(id,memos);
      S.memoEdit=false;
      renderMemos(id);
    };
  }
  sec.querySelectorAll('.memo-item-del').forEach(btn=>{
    btn.onclick=()=>{
      const idx=parseInt(btn.dataset.idx);
      const memos=getMemos(id);
      if(confirm('このメモを削除しますか？')){memos.splice(idx,1);saveMemos(id,memos);renderMemos(id);}
    };
  });
}

function sHTML(sec){
  if(sec.type==='steps'){
    let h='<div class="sec-section"><div class="sec-section-title">'+sec.title+'</div>';
    sec.items.forEach((it,i)=>h+='<div class="step-row"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+it+'</div></div>');
    return h+'</div>';
  }
  if(sec.type==='info') return '<div class="info-card">'+I.info+'<div class="info-text">'+sec.text.replace(/\n/g,'<br>')+'</div></div>';
  if(sec.type==='warn') return '<div class="warn-card">'+I.warn+'<div class="warn-text">'+sec.text.replace(/\n/g,'<br>')+'</div></div>';
  return '';
}

function cHTML(d,sub){
  const cc=C[d.cat];
  return '<div class="card" data-id="'+d.id+'"><div class="card-bar" style="background:'+cc.c+'"></div><div class="card-body"><div class="card-title">'+d.t+'</div>'+(sub?'<div class="card-sub">'+cc.l+'</div>':'')+'</div><div class="card-right">'+(d.n?'<span class="badge">NEW</span>':'')+I.right+'</div></div>';
}

function go(){
  const app=document.getElementById('app');
  if(S.det){
    const d=S.det,cc=C[d.cat];
    app.innerHTML='<div class="hdr"><div class="hdr-back"><button class="back-btn" id="bb">'+I.back+'</button><div class="hdr-cat-icon" style="background:'+cc.c+'">'+I[d.cat]+'</div><div class="hdr-info"><div class="hdr-cat-label">'+cc.l+'</div><div class="hdr-item-title">'+d.t+'</div></div></div></div><div class="detail-body">'+(d.n?'<div class="detail-new">NEW</div>':'')+'<div class="detail-title">'+d.t+'</div>'+d.s.map(sHTML).join('')+'<div id="memo-sec"></div></div>';
    document.getElementById('bb').onclick=()=>{S.det=null;S.memoEdit=false;go();window.scrollTo(0,0);};
    renderMemos(d.id);
    return;
  }
  const kw=S.q.toLowerCase().trim();
  let items=kw?D.filter(d=>d.t.toLowerCase().includes(kw)||d.s.some(s=>(s.items&&s.items.some(t=>t.toLowerCase().includes(kw)))||(s.text&&s.text.toLowerCase().includes(kw)))):S.cat==='all'?D:D.filter(d=>d.cat===S.cat);
  const aA=S.cat==='all';
  const tabs=O.map(k=>{const a=S.cat===k,cc=C[k],sh={scan:'本体',sub:'SubViewer',nc:'NC連携',eye:'eye'}[k];return '<button class="tab'+(a?' active':'')+'" data-cat="'+k+'" style="'+(a?'background:'+cc.c+';border-color:'+cc.c+';color:#fff':'')+'">'+I[k]+sh+'</button>';}).join('');
  let lh='';
  if(!items.length)lh='<div class="empty">該当する症状が見つかりませんでした</div>';
  else if(kw)lh=items.map(d=>cHTML(d,true)).join('');
  else O.forEach(c=>{const g=items.filter(d=>d.cat===c);if(!g.length)return;const cc=C[c];if(aA)lh+='<div class="sec-hdr"><div class="sec-icon" style="background:'+cc.c+'">'+I[c]+'</div><div class="sec-label">'+cc.l+'</div></div>';lh+=g.map(d=>cHTML(d,false)).join('');});
  app.innerHTML='<div class="hdr"><div class="hdr-title">ScanGuide</div><div class="hdr-sub">眠りSCAN</div></div><div class="search-wrap"><span class="search-icon">'+I.search+'</span><input class="search-input" id="si" type="text" placeholder="症状を検索..." value="'+S.q.replace(/"/g,'&quot;')+'"></div>'+(!S.q?'<div class="tabs"><button class="tab'+(aA?' active':'')+'" data-cat="all" style="'+(aA?'background:#0055CC;border-color:#0055CC;color:#fff':'')+'">すべて</button>'+tabs+'</div>':'')+'<div class="list">'+lh+'</div>';
  document.getElementById('si').addEventListener('input',e=>{S.q=e.target.value;S.cat='all';go();});
  document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{S.cat=b.dataset.cat;S.q='';go();});
  document.querySelectorAll('[data-id]').forEach(c=>c.onclick=()=>{S.det=D.find(d=>d.id===c.dataset.id);go();window.scrollTo(0,0);});
}
go();
</script>
